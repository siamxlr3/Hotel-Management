services:
  - type: web
    name: hotel-management-live
    env: php
    plan: free
    buildCommand: "composer install --no-dev && npm install && npm run build"
    startCommand: "apache2-foreground"
    disk:
      name: hotel-storage
      mountPath: /var/www/html/storage/app/public
      sizeGB: 1
    envVars:
      - key: DOCUMENT_ROOT
        value: /var/www/html/public
